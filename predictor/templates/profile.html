{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- TOP COVER -->

                <div
                    style="
                    height:220px;
                    background:linear-gradient(135deg,#007bff,#00c6ff);
                    position:relative;
                    "
                >

                    <!-- PROFILE IMAGE -->

                    <form
                        method="POST"
                        enctype="multipart/form-data"
                        id="profileForm"
                    >

                        {% csrf_token %}

                        <label
                            for="imageUpload"
                            style="
                            position:absolute;
                            bottom:-60px;
                            left:50%;
                            transform:translateX(-50%);
                            cursor:pointer;
                            "
                        >

                            <img
                                src="{{ profile.image.url }}"
                                width="140"
                                height="140"
                                class="rounded-circle border border-4 border-white shadow"
                                style="object-fit:cover;background:white;"
                            >

                        </label>

                        <input
                            type="file"
                            name="image"
                            id="imageUpload"
                            hidden
                            onchange="document.getElementById('profileForm').submit();"
                        >

                    </form>

                </div>



                <!-- PROFILE CONTENT -->

                <div class="card-body text-center pt-5 mt-4">

                    <h2 class="fw-bold">
                        {{ request.user.username }}
                    </h2>

                    <p class="text-muted mb-4">
                        {{ request.user.email }}
                    </p>

                    <!-- STATS -->

                    <div class="row mt-4">

                        <div class="col-md-4 mb-3">

                            <div class="bg-light p-4 rounded-4">

                                <h3 class="fw-bold text-primary">
                                    {{ total_predictions }}
                                </h3>

                                <p class="mb-0 text-muted">
                                    Predictions
                                </p>

                            </div>

                        </div>

                        <div class="col-md-4 mb-3">

                            <div class="bg-light p-4 rounded-4">

                                <h3 class="fw-bold text-success">
                                    Active
                                </h3>

                                <p class="mb-0 text-muted">
                                    Account Status
                                </p>

                            </div>

                        </div>

                        <div class="col-md-4 mb-3">

                            <div class="bg-light p-4 rounded-4">

                                <h6 class="fw-bold text-dark">
                                    {{ request.user.date_joined|date:"d M Y" }}
                                </h6>

                                <p class="mb-0 text-muted">
                                    Joined Date
                                </p>

                            </div>

                        </div>

                    </div>



                    <!-- BUTTONS -->

                    <div class="mt-5 d-flex justify-content-center gap-3 flex-wrap">

                        <a
                            href="/dashboard/"
                            class="btn btn-primary px-4 py-2 rounded-pill"
                        >
                            Dashboard
                        </a>

                        <a
                            href="/history/"
                            class="btn btn-dark px-4 py-2 rounded-pill"
                        >
                            History
                        </a>

                        <a
                            href="/graph/"
                            class="btn btn-success px-4 py-2 rounded-pill"
                        >
                            Analytics
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
