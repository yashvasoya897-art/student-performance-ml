{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <div class="text-center">

            <!-- PROFILE IMAGE -->
            <img
                src="/media/default.png"
                width="150"
                height="150"
                class="rounded-circle border border-3"
            >

            <!-- USERNAME -->
            <h2 class="mt-3">
                {{ request.user.username }}
            </h2>

            <!-- EMAIL -->
            <p class="text-muted">
                {{ request.user.email }}
            </p>

        </div>

        <hr>

        <!-- JOIN DATE -->
        <h5>
            📅 Joined:
            {{ request.user.date_joined }}
        </h5>

        <!-- TOTAL PREDICTIONS -->
        <h5 class="mt-3">
            📊 Total Predictions:
            {{ total_predictions }}
        </h5>

        <hr>

        <!-- IMAGE UPLOAD -->
        <h4>
            Change Profile Picture
        </h4>

        <form
            method="POST"
            enctype="multipart/form-data"
        >

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary"
            >
                Upload
            </button>

        </form>

    </div>

</div>

{% endblock %}
