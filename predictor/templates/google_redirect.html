{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Predictor — Sign in with Google</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1b2a;
    --navy-mid: #1b2d42;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #ffffff;
    --gray: #8a9bb0;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    background-color: var(--navy);
    position: relative;
    overflow: hidden;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
  }

  .orb-1 {
    width: 400px; height: 400px;
    background: var(--gold);
    top: -150px; right: -100px;
  }

  .orb-2 {
    width: 300px; height: 300px;
    background: #4a90d9;
    bottom: -100px; left: -80px;
    animation-delay: 3s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-30px); }
  }

  .card {
    position: relative;
    z-index: 2;
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    animation: slideUp 0.6s ease forwards;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .brand-icon {
    width: 34px; height: 34px;
    background: var(--gold);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-icon svg {
    width: 18px; height: 18px;
    fill: none;
    stroke: var(--navy);
    stroke-width: 2;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--white);
    letter-spacing: 0.5px;
  }

  .brand-divider {
    width: 40px;
    height: 1px;
    background: rgba(201,168,76,0.3);
    margin: 0 auto 28px;
  }

  .google-circle {
    width: 64px; height: 64px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .google-circle svg { width: 32px; height: 32px; }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--white);
    margin-bottom: 10px;
  }

  .card-subtitle {
    font-size: 14px;
    color: var(--gray);
    line-height: 1.6;
    margin-bottom: 36px;
    font-weight: 300;
  }

  .card-subtitle span {
    color: var(--gold);
    font-weight: 500;
  }

  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 20px;
    background: var(--white);
    border: none;
    border-radius: 10px;
    color: #1a1a2e;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    margin-bottom: 14px;
  }

  .btn-google:hover {
    background: #f0f0f0;
    box-shadow: 0 8px 24px rgba(255,255,255,0.15);
    transform: translateY(-1px);
  }

  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

  .btn-cancel {
    display: block;
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid rgba(138,155,176,0.2);
    border-radius: 10px;
    color: var(--gray);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, transform 0.1s;
  }

  .btn-cancel:hover {
    border-color: rgba(201,168,76,0.4);
    color: var(--gold);
    transform: translateY(-1px);
  }

  .security-note {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 28px;
    font-size: 11px;
    color: rgba(138,155,176,0.6);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .security-note svg {
    width: 12px; height: 12px;
    stroke: rgba(138,155,176,0.6);
    fill: none;
    stroke-width: 2;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">

  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="brand-name">ML Predictor</span>
  </div>

  <div class="brand-divider"></div>

  <div class="google-circle">
    <svg viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
  </div>

  <h2 class="card-title">Sign in with Google</h2>
  <p class="card-subtitle">
    You will be redirected to Google to complete sign in to <span>ML Predictor</span>
  </p>

  <!-- Agar allauth use kar rahe ho -->
  <a href="{% provider_login_url 'google' %}" class="btn-google">
    <svg viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continue with Google
  </a>

  <a href="{% url 'login' %}" class="btn-cancel">Cancel — Go back to Login</a>

  <div class="security-note">
    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Secured by Google OAuth 2.0
  </div>

</div>

</body>
</html>
