<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password — ML Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d1b2a; --navy-mid: #1b2d42;
    --gold: #c9a84c; --gold-light: #e8c97a;
    --white: #ffffff; --gray: #8a9bb0;
  }
  body {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif;
    background-color: var(--navy); overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events: none;
  }
  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(80px); opacity: 0.12;
    animation: float 8s ease-in-out infinite; pointer-events: none;
  }
  .orb-1 { width: 400px; height: 400px; background: var(--gold); top: -150px; right: -100px; }
  .orb-2 { width: 300px; height: 300px; background: #4a90d9; bottom: -100px; left: -80px; animation-delay: 3s; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
  .card {
    position: relative; z-index: 2;
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 20px; padding: 48px 44px;
    width: 100%; max-width: 420px; text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    animation: slideUp 0.6s ease forwards;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .brand {
    display: flex; align-items: center;
    justify-content: center; gap: 10px; margin-bottom: 32px;
  }
  .brand-icon {
    width: 34px; height: 34px; background: var(--gold);
    border-radius: 8px; display: flex;
    align-items: center; justify-content: center;
  }
  .brand-icon svg { width: 18px; height: 18px; fill: none; stroke: var(--navy); stroke-width: 2; }
  .brand-name { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--white); }
  .icon-circle {
    width: 64px; height: 64px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center; margin: 0 auto 24px;
  }
  .icon-circle svg { width: 28px; height: 28px; stroke: var(--gold); fill: none; stroke-width: 1.8; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--white); margin-bottom: 10px; }
  .card-subtitle { font-size: 14px; color: var(--gray); line-height: 1.6; margin-bottom: 32px; font-weight: 300; }
  label {
    display: block; font-size: 11px; color: var(--gold);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 8px; font-weight: 500; text-align: left;
  }
  .input-wrap { position: relative; margin-bottom: 24px; }
  .input-wrap svg {
    position: absolute; left: 16px; top: 50%;
    transform: translateY(-50%); width: 16px; height: 16px;
    stroke: var(--gray); fill: none; stroke-width: 1.5;
    transition: stroke 0.2s; pointer-events: none;
  }
  input[type="email"] {
    width: 100%; padding: 13px 16px 13px 44px;
    background: var(--navy); border: 1px solid rgba(138,155,176,0.2);
    border-radius: 10px; color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }
  input::placeholder { color: rgba(138,155,176,0.5); }
  input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
  .input-wrap:focus-within svg { stroke: var(--gold); }
  .btn-reset {
    width: 100%; padding: 15px; background: var(--gold);
    border: none; border-radius: 10px; color: var(--navy);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    font-weight: 500; cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  }
  .btn-reset:hover { background: var(--gold-light); box-shadow: 0 8px 24px rgba(201,168,76,0.3); transform: translateY(-1px); }
  .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--gray); text-decoration: none; }
  .back-link:hover { color: var(--gold); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="card">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="brand-name">ML Predictor</span>
  </div>
  <div class="icon-circle">
    <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
  </div>
  <h2 class="card-title">Reset Password</h2>
  <p class="card-subtitle">Enter your email address and we'll send you a reset link</p>
  <form method="POST">
    {% csrf_token %}
    <label for="id_email">Email Address</label>
    <div class="input-wrap">
      <input type="email" id="id_email" name="email" placeholder="Enter your email" required>
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <button type="submit" class="btn-reset">Send Reset Link</button>
  </form>
  <a href="{% url 'login' %}" class="back-link">← Back to Login</a>
</div>
</body>
</html>
