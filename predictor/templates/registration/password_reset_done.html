<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Sent — ML Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --navy: #0d1b2a; --navy-mid: #1b2d42; --gold: #c9a84c; --gold-light: #e8c97a; --white: #ffffff; --gray: #8a9bb0; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; background-color: var(--navy); overflow: hidden; }
  .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; animation: float 8s ease-in-out infinite; pointer-events: none; }
  .orb-1 { width: 400px; height: 400px; background: var(--gold); top: -150px; right: -100px; }
  .orb-2 { width: 300px; height: 300px; background: #4a90d9; bottom: -100px; left: -80px; animation-delay: 3s; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
  .card { position: relative; z-index: 2; background: var(--navy-mid); border: 1px solid rgba(201,168,76,0.15); border-radius: 20px; padding: 48px 44px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 24px 64px rgba(0,0,0,0.4); animation: slideUp 0.6s ease forwards; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 32px; }
  .brand-icon { width: 34px; height: 34px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .brand-icon svg { width: 18px; height: 18px; fill: none; stroke: var(--navy); stroke-width: 2; }
  .brand-name { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--white); }
  .success-circle { width: 72px; height: 72px; background: rgba(52,168,83,0.1); border: 1px solid rgba(52,168,83,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
  .success-circle svg { width: 32px; height: 32px; stroke: #34A853; fill: none; stroke-width: 2; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--white); margin-bottom: 10px; }
  .card-subtitle { font-size: 14px; color: var(--gray); line-height: 1.7; margin-bottom: 32px; font-weight: 300; }
  .card-subtitle span { color: var(--gold); font-weight: 500; }
  .btn-back { display: block; width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; color: var(--navy); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.2s, transform 0.1s; }
  .btn-back:hover { background: var(--gold-light); transform: translateY(-1px); }
  .spam-note { margin-top: 16px; font-size: 12px; color: rgba(138,155,176,0.6); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="card">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="brand-name">ML Predictor</span>
  </div>
  <div class="success-circle">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h2 class="card-title">Email Sent!</h2>
  <p class="card-subtitle">
    We've sent a password reset link to your email.<br>
    <span>Check your inbox</span> and follow the instructions.
  </p>
  <a href="{% url 'login' %}" class="btn-back">Back to Login</a>
  <p class="spam-note">⚠ Email nahi mila? Spam folder check karo</p>
</div>
</body>
</html>
