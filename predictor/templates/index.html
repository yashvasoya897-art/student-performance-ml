{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card p-4 shadow" style="max-width: 450px; margin: auto; border-radius: 15px;">

        <h3 class="text-center mb-3">📊 Student Performance Predictor</h3>

        <form method="POST">
            {% csrf_token %}

            <!-- HOURS INPUT -->
            <label class="form-label">Enter Study Hours</label>

            <input type="number"
                   step="any"
                   name="hours"
                   class="form-control mb-3"
                   placeholder="Enter Hours (e.g. 1, 2, 3.5)"
                   required>

            <!-- BUTTON -->
            <button type="submit" class="btn btn-primary w-100">
                Predict Marks
            </button>

        </form>

        <!-- RESULT -->
        {% if result is not None %}
        <div class="alert alert-success mt-3 text-center">
            🎯 Predicted Result: <b>{{ result }}</b>
        </div>
        {% endif %}

    </div>

</div>

{% endblock %}
